# ============================================
# PERFIL DE TEST - BASES DE DATOS EMBEBIDAS
# ============================================

# --------------------------------------------
# MongoDB Embebido
# --------------------------------------------
spring.data.mongodb.port=0
# Puerto aleatorio
spring.data.mongodb.host=localhost
spring.data.mongodb.database=test
de.flapdoodle.mongodb.embedded.version=4.0.2

# --------------------------------------------
# MySQL (H2 emulado) para R2DBC
# --------------------------------------------
spring.r2dbc.url=r2dbc:h2:mem:///testdb?options=DB_CLOSE_DELAY=-1;MODE=MySQL
spring.r2dbc.username=sa
spring.r2dbc.password=
spring.r2dbc.properties.sslMode=DISABLED
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10

# --------------------------------------------
# SQL Init - Desactivado para tests
# --------------------------------------------
spring.sql.init.mode=never

# --------------------------------------------
# Logging para depuraciˇn
# --------------------------------------------
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.it.academy.blackjack=DEBUG

# --------------------------------------------
# Desactivar comprobaciones de salud
# --------------------------------------------
management.health.mongo.enabled=false
management.health.db.enabled=false